name: Prepare Kingswood Hub repo

on:
  push:
    paths:
      - 'Kingswood-Hub-GitHub-Upload-*.zip'
      - '.github/workflows/unpack-hub.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Unpack zip if present and normalise paths
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import glob, shutil, zipfile
          from pathlib import Path

          zips = sorted(glob.glob('Kingswood-Hub-GitHub-Upload-*.zip'))
          if zips:
              zip_path = zips[-1]
              print(f'Unpacking {zip_path}')
              with zipfile.ZipFile(zip_path) as zf:
                  zf.extractall('.')
              Path(zip_path).unlink(missing_ok=True)

          # Convert Windows-style backslash filenames into proper folders for Linux hosting.
          files = [p for p in Path('.').iterdir() if '\\' in p.name]
          for p in files:
              target = Path(p.name.replace('\\', '/'))
              target.parent.mkdir(parents=True, exist_ok=True)
              if target.exists():
                  if target.is_dir():
                      shutil.rmtree(target)
                  else:
                      target.unlink()
              p.rename(target)

          for path in [
              'data/backups',
              'tmp',
              'node_modules',
              'backups',
          ]:
              shutil.rmtree(path, ignore_errors=True)

          for path in [
              'data/tech-app-pins-private.json',
              'hub-server.log',
              'hub-server.err.log',
              'proofing-builder.log',
              'proofing-builder.err.log',
              'Kingswood-Hub-GitHub-Upload-20260703-115433.zip',
          ]:
              Path(path).unlink(missing_ok=True)

          required = ['package.json', 'render.yaml', 'index.html', 'app.js', 'styles.css', '.preview-server.cjs']
          missing = [p for p in required if not Path(p).exists()]
          if missing:
              raise SystemExit('Missing required files: ' + ', '.join(missing))
          PY

      - name: Commit prepared Hub files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Prepare Kingswood Hub for hosting"
            git push
          fi
